# Dependabot — автоматическое обновление зависимостей
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Стратегия: минимум PR, максимум группировки.
# Minor/patch объединяются в одну группу, major — отдельные PR.

version: 2
updates:
  # Frontend (root package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Все minor/patch dev-зависимости в один PR
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Все minor/patch production-зависимости в один PR
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # Backend (server/package.json)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions — обновляются редко, раз в месяц достаточно
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "monthly"
