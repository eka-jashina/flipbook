    <!-- Модальное окно редактирования амбиента -->
    <dialog class="admin-modal" id="ambientModal">
      <form class="modal-form" id="ambientForm" method="dialog">
        <h3 class="modal-title" id="ambientModalTitle" data-i18n="admin.modal.ambient.addTitle">Добавить атмосферу</h3>
        <div class="form-group">
          <label class="form-label" for="ambientLabel" data-i18n="admin.modal.ambient.nameLabel">Название</label>
          <input class="form-input" type="text" id="ambientLabel" data-i18n-placeholder="admin.modal.ambient.namePlaceholder" placeholder="Океан" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="ambientIcon" data-i18n="admin.modal.ambient.iconLabel">Иконка (эмодзи)</label>
          <input class="form-input" type="text" id="ambientIcon" placeholder="🌊" required maxlength="4">
          <span class="form-hint" data-i18n="admin.modal.ambient.iconHint">Одно эмодзи для отображения на кнопке</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="ambientFile" data-i18n="admin.modal.ambient.filePathLabel">Путь к файлу</label>
          <input class="form-input" type="text" id="ambientFile" data-i18n-placeholder="admin.modal.ambient.filePathPlaceholder" placeholder="sounds/ambient/ocean.mp3">
          <span class="form-hint" data-i18n="admin.modal.ambient.filePathHint">Путь к аудиофайлу или загрузите ниже</span>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="admin.modal.ambient.orUpload">Или загрузить файл</label>
          <label class="btn btn-secondary upload-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path fill="currentColor" d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
            </svg>
            <span id="ambientUploadLabel" data-i18n="admin.modal.ambient.selectFile">Выбрать файл</span>
            <input type="file" id="ambientFileUpload" accept="audio/*" hidden>
          </label>
          <span class="form-hint" data-i18n="admin.modal.ambient.fileSizeHint">Макс. 5 МБ. Будет сохранён в конфигурации</span>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" type="button" id="cancelAmbientModal" data-i18n="common.cancel">Отмена</button>
          <button class="btn btn-primary" type="submit" id="saveAmbient" data-i18n="common.save">Сохранить</button>
        </div>
      </form>
    </dialog>
