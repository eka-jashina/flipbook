    <!-- Install prompt (PWA) — статическая разметка, управляется через JS show/hide -->
    <div class="install-prompt" id="install-prompt" role="dialog" aria-labelledby="install-prompt-title" hidden>
      <div class="install-prompt__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="32" height="32">
          <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-7-2l4-4h-3V7h-2v6H8l4 4z"/>
        </svg>
      </div>
      <div class="install-prompt__content">
        <div class="install-prompt__title" id="install-prompt-title">Установите приложение</div>
        <div class="install-prompt__text">Читайте книгу офлайн с удобным доступом</div>
      </div>
      <div class="install-prompt__actions">
        <button class="install-prompt__btn install-prompt__btn--dismiss" type="button" aria-label="Не сейчас">Позже</button>
        <button class="install-prompt__btn install-prompt__btn--install" type="button">Установить</button>
      </div>
      <button class="install-prompt__close" type="button" aria-label="Закрыть">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

    <!-- Offline indicator — статическая разметка -->
    <div class="offline-indicator" id="offline-indicator" role="status" aria-live="polite" hidden>
      <span class="offline-indicator__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zM21 18.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/>
        </svg>
      </span>
      <span class="offline-indicator__text">Режим офлайн</span>
    </div>

    <!-- Swipe hint — подсказка о жесте свайпа (показывается один раз на мобильных) -->
    <div class="swipe-hint" id="swipe-hint" hidden>
      <svg class="swipe-hint__hand" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M18 13c-.55 0-1.01.45-1.06.99l-.09.95C16.71 16.12 15.58 17 14.3 17H10c-.55 0-1-.45-1-1v-5.21c0-.45.3-.85.74-.97l5.02-1.37c.73-.2 1.24-.87 1.24-1.63V6.5c0-.83-.67-1.5-1.5-1.5S13 5.67 13 6.5v.28L8.4 8.33C7.56 8.56 7 9.33 7 10.19V16c0 1.66 1.34 3 3 3h4.3c2.08 0 3.86-1.46 4.28-3.49l.27-1.07c.13-.52-.27-1.01-.81-1.01-.01 0-.03 0-.04.01V13z"/>
      </svg>
      <span class="swipe-hint__text">Листайте свайпом<br>влево и вправо</span>
    </div>
