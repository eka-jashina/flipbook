# Prometheus configuration — scrape метрик с сервера Flipbook.
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'flipbook-server'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['server:4000']
        labels:
          service: 'flipbook'
          environment: 'local'
    scrape_interval: 10s
    scrape_timeout: 5s
