# Docker Compose overlay — бэкапы БД + агрегация логов (Loki + Grafana).
#
# Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Доступ:
#   Grafana:  http://localhost:3100  (admin / admin)
#   Loki API: http://localhost:3200
#
# Ручной бэкап:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml run --rm pg-backup

services:
  # --- Ежедневный бэкап PostgreSQL (3:00 UTC, хранение 7 дней) ---
  pg-backup:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://flipbook:flipbook_dev@postgres:5432/flipbook
      BACKUP_RETENTION_DAYS: "7"
      PGPASSWORD: flipbook_dev
    volumes:
      - ./scripts/backup-db.sh:/backup-db.sh:ro
      - pg_backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    # Cron: ежедневный бэкап в 3:00 UTC + запуск при старте
    command:
      - |
        echo "=== Flipbook DB Backup Service ==="
        # Начальный бэкап при запуске
        BACKUP_DIR=/backups /bin/bash /backup-db.sh
        # Установка cron-задачи
        echo "0 3 * * * DATABASE_URL=$$DATABASE_URL BACKUP_DIR=/backups BACKUP_RETENTION_DAYS=$$BACKUP_RETENTION_DAYS /bin/bash /backup-db.sh >> /var/log/backup.log 2>&1" | crontab -
        echo "Cron настроен: ежедневный бэкап в 03:00 UTC"
        crond -f -l 2
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Loki — агрегация логов ---
  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3200:3100"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --- Grafana — дашборды и визуализация логов ---
  grafana:
    image: grafana/grafana:11.0.0
    depends_on:
      loki:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3100"
    volumes:
      - ./infra/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/loki.yaml:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3100:3100"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- Переопределение сервера: логирование в Loki ---
  server:
    environment:
      LOKI_URL: http://loki:3100
    depends_on:
      loki:
        condition: service_healthy

volumes:
  pg_backups:
  loki_data:
  grafana_data:
